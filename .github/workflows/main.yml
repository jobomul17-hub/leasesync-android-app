name: Compile Free Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code Files
        uses: actions/checkout@v4

      - name: Setup Web Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create Web Distribution Folder
        run: |
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/; fi
          if [ -f www/index.html ]; then echo "File verified"; else echo "<h1>LeaseSync</h1>" > www/index.html; fi

      - name: Build Android Package Installer
        uses: ionic-team/appflow-build-action@v1
        with:
          platform: android
          build-type: debug
          web-dir: www
          
