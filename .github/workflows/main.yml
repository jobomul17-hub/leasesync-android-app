name: Compile Free Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code Files
        uses: actions/checkout@v4

      - name: Configure Web Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configure Android SDK Tools
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fix Mobile Directory
        run: |
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/; fi
          if [ -f www/index.html ]; then echo "File found successfully"; else echo "<h1>LeaseSync</h1>" > www/index.html; fi

      - name: Build Mobile Project Engine
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init LeaseSync com.leasesync.tbk --web-dir=www
          npx cap add android

      - name: Package Final Mobile APK File
        run: |
          cd android && ./gradlew assembleDebug

      - name: Deliver Finished APK Link
        uses: actions/upload-artifact@v4
        with:
          name: LeaseSync-App-Package
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
